<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecTask - Restablecer contraseña">
  <title>SecTask - Restablecer Contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <h1>🔒 Sec<span>Task</span></h1>
        <p>Nueva contraseña</p>
      </div>

      <div id="alert-container"></div>

      <form id="resetForm" onsubmit="handleResetPassword(event)">
        <div class="mb-3">
          <label for="newPassword" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="newPassword" placeholder="••••••••" required autocomplete="new-password">
          <small class="text-muted" style="font-size: 0.8rem;">Mín. 8 caracteres, 1 mayúscula, 1 número</small>
        </div>

        <div class="mb-4">
          <label for="confirmPassword" class="form-label">Confirmar</label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">Actualizar Contraseña</button>

        <div class="text-center">
          <a href="/index.html" style="font-size: 0.9rem;">← Volver al Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Verificar que hay un token en la URL
    const params = new URLSearchParams(window.location.search);
    if (!params.get('token')) {
      showAlert('alert-container', 'danger', 'No se encontró token de recuperación. Solicite uno nuevo.');
      document.getElementById('resetForm').querySelector('button').disabled = true;
    }
  </script>
</body>
</html>

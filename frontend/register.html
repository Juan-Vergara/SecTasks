<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecTask - Crear una nueva cuenta">
  <title>SecTask - Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <h1>🔒 Sec<span>Task</span></h1>
        <p>Crear nueva cuenta</p>
      </div>

      <div id="alert-container"></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="mb-3">
          <label for="username" class="form-label">Nombre de Usuario</label>
          <input type="text" class="form-control" id="username" placeholder="usuario123" required>
          <small class="text-muted">Solo letras y números, 3-30 caracteres.</small>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          <small class="text-muted">Mínimo 8 caracteres, una mayúscula y un número.</small>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required>
        </div>

        <div class="mb-3 d-flex justify-content-center">
          <div class="g-recaptcha" data-sitekey="6Le7OgEtAAAAAJ9611MY97oJptC4JO4omOC-kdK1"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">Crear Cuenta</button>

        <div class="text-center">
          <span class="text-secondary">¿Ya tienes cuenta? </span>
          <a href="/index.html">Iniciar Sesión</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script>redirectIfAuthenticated();</script>
</body>
</html>

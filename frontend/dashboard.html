<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecTask - Panel de gestión de tareas">
  <title>SecTask - Mis Tareas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/dashboard.html">🔒 Sec<span>Task</span></a>
      <div class="d-flex align-items-center gap-3">
        <span class="navbar-text" id="userGreeting">Hola, usuario</span>
        <button class="btn btn-outline-light btn-sm" onclick="handleLogout()">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="dashboard-container">
    <div class="dashboard-header">
      <h2>📋 Mis Tareas</h2>
      <button class="btn btn-primary" onclick="openCreateModal()">✨ Nueva Tarea</button>
    </div>

    <div id="alert-container"></div>

    <!-- Lista de tareas -->
    <div id="task-list" class="task-list">
      <div class="loading-spinner">
        <div class="spinner-border"></div>
      </div>
    </div>
  </div>

  <!-- Modal para Crear/Editar Tarea -->
  <div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="taskModalLabel">✨ Nueva Tarea</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <form id="taskForm" onsubmit="handleSaveTask(event)">
          <div class="modal-body">
            <div id="modal-alert"></div>

            <div class="mb-3">
              <label for="taskTitle" class="form-label">Título</label>
              <input type="text" class="form-control" id="taskTitle" placeholder="Nombre de la tarea" maxlength="100" required>
            </div>

            <div class="mb-3">
              <label for="taskDescription" class="form-label">Descripción</label>
              <textarea class="form-control" id="taskDescription" rows="3" placeholder="¿En qué consiste esta tarea?" maxlength="500"></textarea>
            </div>

            <div class="mb-3" id="taskStatusGroup" style="display: none;">
              <label for="taskStatus" class="form-label">Estado</label>
              <select class="form-select" id="taskStatus">
                <option value="pending">Pendiente</option>
                <option value="in_progress">En Progreso</option>
                <option value="completed">Completada</option>
              </select>
            </div>

            <div class="mb-3"
              id="taskDeadlineGroup"
              style="display: none;"
            >
              <label for="taskDeadline" class="form-label">Fecha límite</label>
              <input type="datetime-local" class="form-control" id="taskDeadline">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="taskSubmitBtn">Crear Tarea</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/tasks.js"></script>
  <script>
    // Verificar autenticación y cargar datos
    (async () => {
      const user = await requireAuth();
      if (user) {
        document.getElementById('userGreeting').textContent = `Hola, ${user.username}`;
        loadTasks();
      }
    })();
  </script>
</body>
</html>

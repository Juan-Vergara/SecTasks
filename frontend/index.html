<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecTask - Sistema de Gestión de Tareas Seguro. Inicie sesión para acceder.">
  <title>SecTask - Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <h1>🔒 Sec<span>Task</span></h1>
        <p>Sistema de Gestión de Tareas Seguro</p>
      </div>

      <div id="alert-container"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>

        <div class="mb-3 d-flex justify-content-center">
          <div class="g-recaptcha" data-sitekey="6Le7OgEtAAAAAJ9611MY97oJptC4JO4omOC-kdK1"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">Iniciar Sesión</button>

        <div class="text-center">
          <a href="/forgot-password.html" class="d-block mb-2">¿Olvidaste tu contraseña?</a>
          <span class="text-secondary">¿No tienes cuenta? </span>
          <a href="/register.html">Regístrate</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
  <script>redirectIfAuthenticated();</script>
</body>
</html>

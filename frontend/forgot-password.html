<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecTask - Recuperar contraseña">
  <title>SecTask - Recuperar Contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <h1>🔒 Sec<span>Task</span></h1>
        <p>Recuperar contraseña</p>
      </div>

      <div id="alert-container"></div>

      <form id="forgotForm" onsubmit="handleForgotPassword(event)">
        <div class="mb-3">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
          <small class="text-muted">Ingrese el email asociado a su cuenta.</small>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">Enviar Enlace</button>

        <div class="text-center">
          <a href="/index.html">← Volver al Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
